<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VBA NI · A-BASA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #111111;
      --accent-soft: #555555;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--accent);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Gornja traka */
    .top-bar {
      padding: 18px 28px;
      font-weight: 600;
      letter-spacing: 0.12em;
      font-size: 14px;
      text-transform: uppercase;
    }

    .top-bar a {
      text-decoration: none;
      color: var(--accent);
      border: 1px solid #e0e0e0;
      padding: 6px 10px;
      border-radius: 999px;
      transition: 0.2s ease;
    }

    .top-bar a:hover {
      background: #111111;
      color: #ffffff;
    }

    /* Glavni sadržaj */
    .content {
      flex: 1;
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (max-width: 600px) {
      .top-bar {
        padding: 14px 18px;
      }
      .content {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- Gornji lijevi kut: A-BASA -->

</body>
