<!DOCTYPE html>
<html lang="en">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
<head>
  <meta charset="UTF-8" />
  <title>ABASA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #111111;
      --accent-soft: #555555;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--accent);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      padding: 18px 28px;
    }

    .logo {
      font-weight: 600;
      letter-spacing: 0.02em;  /* SMANJENO: bilo 0.12em, sada 0.02em */
      font-size: 21px;
      text-transform: uppercase;
      border: 1px solid #e0e0e0;
      padding: 8px 14px;
      border-radius: 999px;
      display: inline-block;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .hero-title {
      font-size: clamp(14px, 2vw, 20px);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hero-tagline {
      font-size: 16px;
      color: var(--accent-soft);
      max-width: 420px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .hero-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      font-size: 14px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }

    .hero-button:hover {
      background: #ffffff;
      color: #111111;
      transform: translateY(-1px);
    }

    .hero-button span.icon {
      font-size: 16px;
    }

    .footer {
      padding: 12px 24px 18px;
      font-size: 11px;
      color: #999999;
      text-align: right;
    }

    @media (max-width: 600px) {
      .top-bar {
        padding: 14px 18px;
      }
      .logo {
        font-size: 18px;
      }
      .footer {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <span class="logo">ABASA</span>
  </header>

  <main class="hero">
    <div class="hero-title">Blueprint Software & System Automation</div>
    <div class="hero-tagline">
      Architecture, workflows and automation for multi-market operations — designed as a stable base for your systems.
    </div>
    <a class="hero-button" href="vba-ni.html">
      <span>Open VBA NI</span>
      <span class="icon">↗</span>
    </a>
  </main>

  <footer class="footer">
    ABASA · a-basa.com
  </footer>
</body>
</html>
