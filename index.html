<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A•BASA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #111111;
      --accent-soft: #555555;
      --accent-light: #888888;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--accent);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOP BAR - Logo s taglineom */
    .top-bar {
      padding: 18px 28px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo {
      font-weight: 600;
      letter-spacing: 0.12em;
      font-size: 14px;
      text-transform: uppercase;
      border: 1px solid #e0e0e0;
      padding: 6px 12px;
      border-radius: 999px;
      display: inline-block;
      width: fit-content;
    }

    .logo-tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--accent-light);
      padding-left: 4px;
      font-style: italic;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .hero-title {
      font-size: clamp(18px, 4vw, 40px);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hero-tagline {
      font-size: 16px;
      color: var(--accent-soft);
      max-width: 420px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .hero-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      font-size: 14px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }

    .hero-button:hover {
      background: #ffffff;
      color: #111111;
      transform: translateY(-1px);
    }

    .hero-button span.icon {
      font-size: 16px;
    }

    .footer {
      padding: 12px 24px 18px;
      font-size: 11px;
      color: #999999;
      text-align: right;
    }

    @media (max-width: 600px) {
      .top-bar {
        padding: 14px 18px;
      }
      .footer {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <div class="logo-container">
      <span class="logo">A•BASA</span>
      <span class="logo-tagline">Blueprint Software & System Automation</span>
    </div>
  </header>

  <main class="hero">
    <div class="hero-title">Blueprint Software & System Automation</div>
    <div class="hero-tagline">
      Architecture, workflows and automation for multi-market operations — designed as a stable base for your systems.
    </div>
    <a class="hero-button" href="vba-ni.html">
      <span>Open VBA NI</span>
      <span class="icon">↗</span>
    </a>
  </main>

  <footer class="footer">
    A•BASA · a-basa.com
  </footer>
</body>
</html>
